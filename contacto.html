<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto - Tornería LF</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <header>
    <h1>Tornería LF</h1>
    <nav id="menu">
      <a href="index.html">Inicio</a>
      <a href="servicios.html">Servicios</a>
      <a href="galeria.html">Galería</a>
      <a href="contacto.html">Contacto</a>
    </nav>
    <button class="menu-toggle" id="menu-toggle">☰</button>
  </header>

  <section id="contacto">
    <h2>Comunicate con nosotros</h2>
    <p>📍 Morón, Buenos Aires</p>
    <p>📞 11-XXXX-XXXX</p>
    <p>✉ contacto@tornerialf.com</p>

    <form id="contactForm">
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" name="nombre" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <label for="mensaje">Mensaje:</label>
      <textarea id="mensaje" name="mensaje" required></textarea>

      <button type="submit">Enviar</button>
    </form>

    <div id="mapa">
      <iframe src="https://www.google.com/maps/embed?pb=!1m18!..." width="100%" height="300" style="border:0;"
        allowfullscreen="" loading="lazy">
      </iframe>
    </div>

    <div class="horarios">
      <h3>Horarios de atención</h3>
      <p>Lunes a Viernes: 9:00 - 18:00</p>
      <p>Sábados: 9:00 - 13:00</p>
    </div>

    <div class="redes">
      <h3>Seguinos</h3>
      <a href="https://facebook.com/torneriaLF" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
      <a href="https://instagram.com/torneriaLF" target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
      <a href="https://wa.me/54911XXXXXXX" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
    </div>
  </section>

  <script src="js/main.js"></script>
</body>

</html>
